name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24.18.0
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/